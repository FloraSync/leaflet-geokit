name: Publish (npm)

on:
  workflow_dispatch:

concurrency:
  group: publish-npm
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish to npm (manual main only)
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node 24.x
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Use npm with trusted publishing support
        run: npm install -g npm@^11.5.1

      - name: Install dependencies
        run: npm ci

      - name: Validate
        run: npm run release:dry

      - name: Read package version
        id: package
        run: echo "version=$(node -p 'require(\"./package.json\").version')" >> "$GITHUB_OUTPUT"

      - name: Verify npm token is configured
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN is missing. Add an npm automation token with @florasync publish rights before dispatching this workflow."
            exit 1
          fi

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Ensure release tag does not already exist
        run: |
          if git rev-parse "v${{ steps.package.outputs.version }}" >/dev/null 2>&1; then
            echo "Tag v${{ steps.package.outputs.version }} already exists."
            exit 1
          fi

      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance

      - name: Tag release
        run: git tag "v${{ steps.package.outputs.version }}"

      - name: Push tag
        run: git push origin "v${{ steps.package.outputs.version }}"
