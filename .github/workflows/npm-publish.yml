name: Publish (npm)

on:
  workflow_dispatch:

concurrency:
  group: publish-npm
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  publish:
    name: Publish to npm (main only)
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Validate
        run: npm run release:dry

      - name: Read package version
        id: package
        run: echo "version=$(node -p 'require(\"./package.json\").version')" >> "$GITHUB_OUTPUT"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Ensure release tag does not already exist
        run: |
          if git rev-parse "v${{ steps.package.outputs.version }}" >/dev/null 2>&1; then
            echo "Tag v${{ steps.package.outputs.version }} already exists."
            exit 1
          fi

      - name: Publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Tag release
        run: git tag "v${{ steps.package.outputs.version }}"

      - name: Push tag
        run: git push origin "v${{ steps.package.outputs.version }}"
